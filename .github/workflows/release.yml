name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release app bundle
        run: ./Scripts/build-app.sh release

      - name: Create tarball
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p pkg
          cp -R build/AgentPong.app pkg/
          cp LICENSE pkg/ 2>/dev/null || true
          tar -czf "AgentPong-${VERSION}-macos.tar.gz" -C pkg AgentPong.app LICENSE

      - name: Compute SHA256 and file size
        id: sha
        run: |
          TARBALL="AgentPong-${{ github.ref_name }}-macos.tar.gz"
          echo "app_sha=$(shasum -a 256 "$TARBALL" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "app_size=$(stat -f%z "$TARBALL")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            AgentPong-${{ github.ref_name }}-macos.tar.gz
          body: |
            ## Install

            **Homebrew (recommended):**
            ```bash
            brew tap ericermerimen/tap
            brew install agentpong
            brew services start agentpong
            agentpong setup
            ```

            **From source:**
            ```bash
            git clone https://github.com/ericermerimen/agentpong.git
            cd agentpong
            make install
            ```

            ## SHA256
            - `AgentPong-${{ github.ref_name }}-macos.tar.gz`: `${{ steps.sha.outputs.app_sha }}`

      - name: Update appcast.xml for Sparkle
        if: "!contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc')"
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          SIZE="${{ steps.sha.outputs.app_size }}"
          URL="https://github.com/ericermerimen/agentpong/releases/download/${VERSION}/AgentPong-${VERSION}-macos.tar.gz"
          PUB_DATE="$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"

          # Generate EdDSA signature if key is available
          ED_SIG=""
          if [ -f ".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/macos-arm64_x86_64/bin/sign_update" ]; then
            ED_SIG=$(.build/artifacts/sparkle/Sparkle/Sparkle.xcframework/macos-arm64_x86_64/bin/sign_update "AgentPong-${VERSION}-macos.tar.gz" 2>/dev/null || echo "")
          fi
          ED_ATTR=""
          if [ -n "$ED_SIG" ]; then
            ED_ATTR="sparkle:edSignature=\"${ED_SIG}\""
          fi

          # Switch to main so we modify the latest appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main

          # Use python3 to reliably insert the new item before </channel>
          python3 -c "
          version_num = '${VERSION_NUM}'
          url = '${URL}'
          size = '${SIZE}'
          pub_date = '${PUB_DATE}'
          ed_attr = '${ED_ATTR}'

          new_item = '''    <item>
            <title>Version {}</title>
            <pubDate>{}</pubDate>
            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
            <enclosure
              url=\"{}\"
              sparkle:version=\"{}\"
              sparkle:shortVersionString=\"{}\"
              {}
              length=\"{}\"
              type=\"application/octet-stream\"
            />
          </item>'''.format(version_num, pub_date, url, version_num, version_num, ed_attr, size)

          with open('site/appcast.xml', 'r') as f:
              content = f.read()

          content = content.replace('  </channel>', new_item + '\n\n  </channel>')

          with open('site/appcast.xml', 'w') as f:
              f.write(content)
          "

          git add site/appcast.xml
          git commit -m "Update appcast.xml for ${VERSION}"
          git push origin main

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        if: env.TAP_TOKEN != '' && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc')
        run: |
          VERSION="${{ github.ref_name }}"
          SHA="${{ steps.sha.outputs.app_sha }}"
          URL="https://github.com/ericermerimen/agentpong/releases/download/${VERSION}/AgentPong-${VERSION}-macos.tar.gz"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ericermerimen/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          mkdir -p Formula

          cat > Formula/agentpong.rb << FORMULA
          class Agentpong < Formula
            desc "Pixel art room with husky pet that monitors Claude Code sessions"
            homepage "https://github.com/ericermerimen/agentpong"
            url "${URL}"
            sha256 "${SHA}"

            depends_on :macos
            depends_on macos: :sonoma

            def install
              prefix.install "AgentPong.app"
              bin.install_symlink prefix/"AgentPong.app/Contents/MacOS/AgentPong" => "agentpong"
            end

            def caveats
              <<~EOS
                Start AgentPong and auto-launch on login:

                  brew services start agentpong

                Setup Claude Code hooks:

                  agentpong setup

                After future upgrades:

                  brew upgrade agentpong && brew services restart agentpong
              EOS
            end

            def post_install
              quiet_system "pkill", "-x", "AgentPong"
              quiet_system "rm", "-rf", "/Applications/AgentPong.app"
              quiet_system "cp", "-R", "#{opt_prefix}/AgentPong.app", "/Applications/AgentPong.app"
            end

            service do
              run [opt_prefix/"AgentPong.app/Contents/MacOS/AgentPong"]
              keep_alive true
              log_path var/"log/agentpong.log"
              error_log_path var/"log/agentpong-error.log"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentpong.rb
          git commit -m "Update agentpong to ${VERSION}" || true
          git pull --rebase origin main || true
          git push origin main
